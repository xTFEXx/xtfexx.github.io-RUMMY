<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RUMMY</title>
    <style>
        :root {
            --bg-base: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.4);
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --text-main: #ffffff;
            --text-muted: #cbd5e1;
            --border: #475569;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-base); color: var(--text-main);
            min-height: 100vh; padding: 15px; padding-bottom: 40px; overflow-x: hidden;
        }

        h1 { color: var(--primary); font-size: 2.2rem; text-align: center; letter-spacing: 4px; margin-bottom: 15px; text-shadow: 0 0 15px var(--primary-glow); font-weight: 900; }
        .text-truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .card-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5); }
        .flex-between { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 10px; }
        
        .config-sentence { color: #e2e8f0; font-size: 0.95rem; line-height: 1.6; margin-bottom: 8px; font-weight: 500; }
        .inline-input {
            background: rgba(0,0,0,0.4); border: none; border-bottom: 2px solid var(--primary);
            color: var(--primary); font-weight: 900; font-size: 1.2rem; width: 75px; text-align: center;
            padding: 2px 5px; outline: none; border-radius: 4px 4px 0 0;
        }

        input.standard-input {
            background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: #ffffff;
            padding: 12px; border-radius: 8px; outline: none; font-size: 1.1rem; width: 100%; text-align: center; transition: 0.2s; font-weight: 600;
        }
        input.standard-input.missing { border-color: var(--danger); background: rgba(239, 68, 68, 0.1); }
        
        input.ghost { background: transparent; border: 1px dashed transparent; color: #ffffff; font-weight: bold; font-size: inherit; width: 100%; text-align: center; padding: 4px; }

        input.total-score-input {
            background: transparent; border: 2px dashed transparent; color: #ffffff;
            font-size: 3.8rem; font-weight: 900; margin: 5px 0 10px 0; width: 100%; text-align: center;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8); outline: none; border-radius: 8px; transition: 0.2s; padding: 0;
        }

        button {
            background: var(--surface-hover); color: #ffffff; border: 1px solid var(--border);
            padding: 12px 15px; border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 0.95rem; transition: 0.2s;
            display: flex; justify-content: center; align-items: center; text-transform: uppercase; letter-spacing: 0.5px;
        }
        button:active { transform: scale(0.96); }
        
        button.primary { background: var(--primary); color: #0f172a; border: none; width: 100%; padding: 15px; font-size: 1.15rem; box-shadow: 0 4px 10px var(--primary-glow); }
        button.danger { background: var(--danger); color: #ffffff; border: none; }
        button.outline-primary { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
        button.action-small { padding: 8px 12px; font-size: 0.85rem; }

        .round-nav { display: flex; overflow-x: auto; gap: 10px; padding: 15px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin: 15px 0 25px 0; scrollbar-width: none; }
        .round-nav::-webkit-scrollbar { display: none; }
        
        .nav-chip {
            background: var(--surface); border: 1px solid var(--border); color: #cbd5e1; padding: 10px 18px; border-radius: 25px; font-size: 0.95rem; font-weight: 800; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: 0.2s;
        }
        .nav-chip.active { background: var(--primary); color: #0f172a; border-color: var(--primary); box-shadow: 0 0 12px var(--primary-glow); }
        .nav-chip.new { background: rgba(56, 189, 248, 0.15); border: 2px dashed var(--primary); color: #ffffff; }

        #viewTitleContainer { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }

        .grid { display: grid; grid-template-columns: 1fr; gap: 18px; }
        @media (min-width: 600px) { .grid { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); } }

        .player-card {
            background: rgba(15, 23, 42, 0.9); border: 2px solid var(--border); border-radius: var(--radius);
            padding: 18px; display: flex; flex-direction: column; align-items: center; position: relative; overflow: hidden;
            transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .player-card.locked { border-color: var(--danger); box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }
        .player-card.winner { border-color: var(--success); box-shadow: 0 0 25px rgba(16, 185, 129, 0.4); }

        .role-badge { font-size: 0.9rem; font-weight: 800; padding: 8px 10px; border-radius: 6px; width: 100%; text-align: center; background: rgba(0, 0, 0, 0.6); color: var(--warning); margin-bottom: 12px; min-height: 32px; border: 1px solid rgba(245, 158, 11, 0.3);}
        
        .cut-btn { width: 100%; margin: 10px 0; font-size: 0.9rem; background: rgba(0,0,0,0.5); border: 1px dashed #94a3b8; color: #e2e8f0; }
        .cut-btn.active { background: var(--warning); border: none; color: #000000; font-weight: 900; box-shadow: 0 0 15px rgba(245, 158, 11, 0.6); }

        .table-container { width: 100%; overflow-x: auto; margin-top: 15px; margin-bottom: 25px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 0.95rem; }
        th, td { padding: 14px 10px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); white-space: nowrap; }
        th { background: rgba(0,0,0,0.6); color: var(--primary); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        tbody tr:hover { background: rgba(255,255,255,0.08); }
        .highlight-row { background: rgba(56, 189, 248, 0.15); font-weight: bold; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.95); display: none; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(5px); padding: 15px;}
        .modal.active { display: flex; }
        .modal-content { background: var(--surface); border: 2px solid var(--primary); padding: 25px; border-radius: var(--radius); width: 100%; max-width: 500px; }
        .save-item { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; padding: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.4); margin-bottom: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <h1>RUMMY</h1>

    <div class="card-panel">
        <div class="flex-between" style="margin-bottom: 20px;">
            <button onclick="saveGamePrompt()" class="outline-primary" style="flex:1;">Guardar Partida</button>
            <button onclick="openLoadModal()" style="flex:1;">Gestionar Partidas</button>
        </div>
        
        <div style="margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
            <div class="config-sentence">
                El jugador gana al llegar a <input type="number" id="cfgWin" class="inline-input" value="1000" onchange="updateConfig()"> puntos.
            </div>
            <div class="config-sentence">
                El jugador se traba a los <input type="number" id="cfgLock" class="inline-input" value="500" onchange="updateConfig()"> puntos.
            </div>
        </div>

        <div class="flex-row" style="display: flex; gap: 10px;">
            <input type="text" id="newPlayerInput" class="standard-input" placeholder="Nombre del jugador..." style="flex: 2;" onkeypress="if(event.key === 'Enter') addPlayer()">
            <button onclick="addPlayer()" class="outline-primary action-small" style="flex: 1; height: 48px;">+ Añadir</button>
        </div>
    </div>

    <h3 style="margin-top: 10px; font-size: 1.2rem; color: #ffffff; text-transform: uppercase; letter-spacing: 2px; text-align: center; font-weight: 900;">Historial de Rondas</h3>
    <div class="table-container">
        <table id="historyTable"></table>
    </div>

    <div class="round-nav" id="roundNav"></div>

    <div id="viewTitleContainer">
        <h2 id="viewTitle" style="text-align: center; font-size: 1.4rem; font-weight: 800; margin: 0; text-transform: uppercase; letter-spacing: 1px;"></h2>
    </div>
    
    <div class="grid" id="playersGrid"></div>

    <div style="margin-top: 25px;" id="actionBtnContainer"></div>

    <div id="loadModal" class="modal">
        <div class="modal-content">
            <h3 style="color: var(--primary); margin-bottom: 20px; text-align: center; font-size: 1.6rem; font-weight: 900;">Mis Partidas</h3>
            <div id="savesList" style="max-height: 250px; overflow-y: auto; margin-bottom: 20px;"></div>
            <div style="border-top: 1px solid var(--border); padding-top: 15px;">
                <button class="outline-primary" style="width: 100%; margin-bottom: 10px;" onclick="document.getElementById('importFile').click()">⬆️ Subir Partida (.json)</button>
                <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importSingleSave(event)">
                <button onclick="closeModal()" class="danger" style="width: 100%; padding: 12px;">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        let state = { config: { win: 1000, lock: 500 }, players: [], rounds: [], currentRoundNum: 1, viewingRoundNum: 1 };
        let liveInputs = { scores: {}, cuts: {} };

        window.onload = () => renderApp();

        function formatName(n) { return n ? n.trim().charAt(0).toUpperCase() + n.trim().slice(1).toLowerCase() : ''; }
        function generateId() { return 'p_' + Math.random().toString(36).substr(2, 9); }

        function calculateTotal(playerId) {
            const p = state.players.find(x => x.id === playerId);
            if(!p) return 0;
            let total = p.baseScore;
            state.rounds.forEach(r => {
                if (r.scores[playerId] !== undefined) total += parseInt(r.scores[playerId]) || 0;
                if (r.cuts[playerId]) total += 50;
            });
            if (state.viewingRoundNum === state.currentRoundNum) {
                if (liveInputs.scores[playerId] !== undefined) total += parseInt(liveInputs.scores[playerId]) || 0;
                if (liveInputs.cuts[playerId]) total += 50;
            }
            return total;
        }

        function overrideTotalScore(playerId, newTotalValue) {
            const p = state.players.find(x => x.id === playerId);
            if (!p) return;
            p.baseScore += (parseInt(newTotalValue) || 0) - calculateTotal(playerId);
            renderApp(true);
        }

        function addPlayer() {
            const input = document.getElementById('newPlayerInput');
            const name = formatName(input.value);
            if (!name) return;
            let minScore = state.players.length > 0 ? Math.min(...state.players.map(p => calculateTotal(p.id))) : 0;
            state.players.push({ id: generateId(), name, joinRound: state.currentRoundNum, baseScore: minScore });
            input.value = '';
            state.viewingRoundNum = state.currentRoundNum; 
            renderApp();
        }

        function removePlayer(playerId) {
            if(confirm('¿Eliminar jugador?')) {
                state.players = state.players.filter(p => p.id !== playerId);
                renderApp();
            }
        }

        function updateConfig() {
            state.config.win = parseInt(document.getElementById('cfgWin').value) || 1000;
            state.config.lock = parseInt(document.getElementById('cfgLock').value) || 500;
            renderApp();
        }

        function handleScoreInput(playerId, value) {
            const val = value === "" ? undefined : parseInt(value);
            if (state.viewingRoundNum === state.currentRoundNum) liveInputs.scores[playerId] = val;
            else { const r = state.rounds.find(x => x.id === state.viewingRoundNum); if(r) r.scores[playerId] = val; }
            renderApp(true);
        }

        function toggleCut(playerId, elementId) {
            if (state.viewingRoundNum === state.currentRoundNum) liveInputs.cuts[playerId] = !liveInputs.cuts[playerId];
            else { const r = state.rounds.find(x => x.id === state.viewingRoundNum); if(r) r.cuts[playerId] = !r.cuts[playerId]; }
            renderApp();
        }

        function deleteRound(roundId) {
            if(confirm(`¿Seguro que deseas eliminar la Ronda ${roundId} permanentemente?`)) {
                state.rounds = state.rounds.filter(r => r.id !== roundId);
                state.rounds.forEach((r, idx) => r.id = idx + 1);
                state.currentRoundNum = state.rounds.length + 1;
                state.viewingRoundNum = state.currentRoundNum;
                renderApp();
            }
        }

        function commitRound() {
            const activePlayers = state.players.filter(p => p.joinRound <= state.currentRoundNum);
            if(activePlayers.length < 2) return alert("Mínimo 2 jugadores.");
            let incomplete = activePlayers.filter(p => liveInputs.scores[p.id] === undefined);
            if (incomplete.length > 0) {
                alert(`Faltan puntos de: ${incomplete.map(p=>p.name).join(", ")}`);
                activePlayers.forEach(p => { const i = document.getElementById(`score_input_${p.id}`); if (liveInputs.scores[p.id] === undefined) i.classList.add('missing'); else i.classList.remove('missing'); });
                return;
            }
            state.rounds.push({ id: state.currentRoundNum, scores: { ...liveInputs.scores }, cuts: { ...liveInputs.cuts } });
            if(state.players.some(p => calculateTotal(p.id) >= state.config.win)) { renderApp(); alert("¡PARTIDA FINALIZADA!"); return; }
            liveInputs = { scores: {}, cuts: {} }; state.currentRoundNum++; state.viewingRoundNum = state.currentRoundNum;
            renderApp();
        }

        function renderApp(keepFocus = false) {
            document.getElementById('cfgWin').value = state.config.win;
            document.getElementById('cfgLock').value = state.config.lock;
            renderNav(); renderCards(keepFocus); renderTable();
        }

        function renderNav() {
            const nav = document.getElementById('roundNav'); nav.innerHTML = '';
            state.rounds.forEach(r => nav.innerHTML += `<div class="nav-chip ${r.id === state.viewingRoundNum ? 'active' : ''}" onclick="state.viewingRoundNum=${r.id};renderApp()">Ronda ${r.id}</div>`);
            nav.innerHTML += `<div class="nav-chip new ${state.currentRoundNum === state.viewingRoundNum ? 'active' : ''}" onclick="state.viewingRoundNum=${state.currentRoundNum};renderApp()">+ Actual (R${state.currentRoundNum})</div>`;
            document.getElementById('viewTitle').innerHTML = state.viewingRoundNum === state.currentRoundNum ? `<span style="color: var(--primary);">📍 Ronda Actual: ${state.currentRoundNum}</span>` : `<span style="color: var(--warning);">🕒 Editando R${state.viewingRoundNum}</span>`;
        }

        function renderCards(keepFocus) {
            const grid = document.getElementById('playersGrid');
            if(!keepFocus) grid.innerHTML = '';
            const isCurrent = state.viewingRoundNum === state.currentRoundNum;
            const activePlayers = state.players.filter(p => p.joinRound <= state.viewingRoundNum);
            const dealer = (state.viewingRoundNum - 1) % Math.max(1, activePlayers.length);
            const mano = (dealer + 1) % Math.max(1, activePlayers.length);
            const cutter = (dealer - 1 + activePlayers.length) % Math.max(1, activePlayers.length);

            activePlayers.forEach((p, idx) => {
                const tot = calculateTotal(p.id);
                const role = activePlayers.length > 1 ? (idx === dealer ? '🎲 Mezcla y Reparte' : (idx === cutter && idx === mano ? '✂️ Corta y ✋ Mano' : (idx === cutter ? '✂️ Corta' : (idx === mano ? '✋ Mano' : 'Turno')))) : 'Solo';
                const curScore = isCurrent ? (liveInputs.scores[p.id] !== undefined ? liveInputs.scores[p.id] : '') : (state.rounds.find(r => r.id === state.viewingRoundNum)?.scores[p.id] ?? '');
                const curCut = isCurrent ? !!liveInputs.cuts[p.id] : !!state.rounds.find(r => r.id === state.viewingRoundNum)?.cuts[p.id];

                if(!keepFocus) {
                    grid.innerHTML += `<div class="player-card ${tot >= state.config.win ? 'winner' : (tot >= state.config.lock ? 'locked' : '')}" id="card_${p.id}">
                        <div class="flex-between"><input type="text" class="ghost" value="${p.name}" onchange="changePlayerName('${p.id}',this.value)"><button class="danger action-small" onclick="removePlayer('${p.id}')">X</button></div>
                        <input type="number" class="total-score-input" value="${tot}" onchange="overrideTotalScore('${p.id}',this.value)">
                        <div class="role-badge">${role}</div>
                        <button class="cut-btn ${curCut ? 'active' : ''}" onclick="toggleCut('${p.id}','card_${p.id}')">${curCut ? 'Corte Perfecto (+50)' : 'Activar Corte'}</button>
                        <input type="number" id="score_input_${p.id}" class="standard-input" placeholder="Puntos..." value="${curScore}" oninput="handleScoreInput('${p.id}',this.value)">
                    </div>`;
                } else { document.querySelector(`#card_${p.id} .total-score-input`).value = tot; }
            });
            document.getElementById('actionBtnContainer').innerHTML = isCurrent ? `<button class="primary" onclick="commitRound()">Siguiente Ronda →</button>` : `<div style="display:flex;gap:10px;"><button class="outline-primary" style="flex:2" onclick="state.viewingRoundNum=${state.currentRoundNum};renderApp()">Volver a Actual</button><button class="danger" style="flex:1" onclick="deleteRound(${state.viewingRoundNum})">🗑️ Borrar R${state.viewingRoundNum}</button></div>`;
        }

        function renderTable() {
            const table = document.getElementById('historyTable');
            if(!state.players.length) return table.innerHTML = '<tr><td>Sin jugadores</td></tr>';
            let h = `<thead><tr><th>Ronda</th>${state.players.map(p => `<th>${p.name}</th>`).join('')}</tr></thead><tbody>`;
            state.rounds.forEach(r => h += `<tr class="${r.id === state.viewingRoundNum ? 'highlight-row' : ''}"><td onclick="state.viewingRoundNum=${r.id};renderApp()">R${r.id} ✏️</td>${state.players.map(p => `<td>${p.joinRound > r.id ? '-' : (r.scores[p.id] ?? 0) + (r.cuts[p.id] ? ' <small>(+50)</small>' : '')}</td>`).join('')}</tr>`);
            h += `</tbody><tfoot><tr><td>TOTAL</td>${state.players.map(p => `<td>${calculateTotal(p.id)}</td>`).join('')}</tr></tfoot>`;
            table.innerHTML = h;
        }

        function getSaves() { return JSON.parse(localStorage.getItem('rummyProSaves') || '{}'); }
        function saveGamePrompt() { if(!state.players.length) return; const name = prompt("Nombre:", `Rummy_${state.players.map(p => p.name[0]).join('')}_R${state.currentRoundNum}`); if(!name) return; const saves = getSaves(); saves[name] = { state, liveInputs }; localStorage.setItem('rummyProSaves', JSON.stringify(saves)); alert("Guardado."); }
        function openLoadModal() {
            const saves = getSaves(); const list = document.getElementById('savesList'); list.innerHTML = '';
            Object.keys(saves).forEach(k => { list.innerHTML += `<div class="save-item"><span>${k}</span><div style="display:flex;gap:5px"><button class="primary action-small" onclick="loadGame('${k}')">Cargar</button><button class="outline-primary action-small" onclick="exportSingleSave('${k}')">💾</button><button class="danger action-small" onclick="deleteSave('${k}')">🗑️</button></div></div>`; });
            document.getElementById('loadModal').classList.add('active');
        }
        function closeModal() { document.getElementById('loadModal').classList.remove('active'); }
        function loadGame(key) { const s = getSaves(); if(s[key] && confirm(`¿Cargar "${key}"?`)) { state = s[key].state; liveInputs = s[key].liveInputs || { scores: {}, cuts: {} }; closeModal(); renderApp(); } }
        function deleteSave(key) { if(confirm(`¿Eliminar "${key}"?`)) { const s = getSaves(); delete s[key]; localStorage.setItem('rummyProSaves', JSON.stringify(s)); openLoadModal(); } }
        function exportSingleSave(key) {
            const s = getSaves(); const blob = new Blob([JSON.stringify({ [key]: s[key] })], { type: "application/json" });
            const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `${key}.json`; a.click(); URL.revokeObjectURL(url);
        }
        function importSingleSave(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader(); reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result); const saves = getSaves();
                    Object.keys(imported).forEach(n => { let fn = n; if (saves[fn]) { if (!confirm(`Sobrescribir "${fn}"?`)) { let c = 1; while(saves[`${fn}_${c}`]) c++; fn = `${fn}_${c}`; } } saves[fn] = imported[n]; });
                    localStorage.setItem('rummyProSaves', JSON.stringify(saves)); openLoadModal();
                } catch (err) { alert("Error."); }
            }; reader.readAsText(file);
        }
    </script>
</body>
</html>
